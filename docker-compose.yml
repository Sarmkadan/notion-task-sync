version: '3.8'

services:
# Main Notion Task Sync service
  notion-sync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notion-task-sync
    restart: unless-stopped

    # Environment variables
    environment:
      - NotionApi__ApiKey=${NOTION_API_KEY}
      - NotionApi__DatabaseId=${NOTION_DATABASE_ID}
      - NotionApi__RateLimitPerSecond=3
      - AppSettings__LocalTasksDirectory=/data/tasks
      - AppSettings__BackupDirectory=/data/backups
      - AppSettings__LogFilePath=/var/log/notion-sync/sync.log
      - Logging__LogLevel__Default=Information
      - SyncConfig__SyncInterval=300
      - SyncConfig__ConflictResolutionStrategy=latest-wins
      - SyncConfig__AutoBackup=true

    # Volume mounts
    volumes:
      - ./config:/app/config
      - ./tasks:/data/tasks
      - ./backups:/data/backups
      - ./logs:/var/log/notion-sync

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

    # Health check
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/NotionTaskSync.dll && echo 'Healthy' || exit 1"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 30s

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    # Networks
    networks:
      - default

# Named volumes
volumes:
  notion-sync-data:
    driver: local
  notion-sync-logs:
    driver: local

# Networks
networks:
  default:
    name: notion-sync-network
    driver: bridge